name: Auto Movie and Series Scraper

on:
  schedule:
    # يشتغل تلقائياً كل 12 ساعة
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # يتيح لك تشغيله يدوياً بضغطة زر من موقع جيتهاب

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    # 1. سحب الكود من المستودع
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. إعداد بيئة Node.js (استخدام نسخة 20 المستقرة)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. تثبيت مكتبة cheerio فقط (تم الاستغناء عن axios)
    - name: Install dependencies
      run: npm install cheerio

    # 4. تشغيل السكربت
    - name: Run Scraper
      run: node scraper.js

    # 5. رفع وحفظ ملفات الـ JSON في مستودعك تلقائياً
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add movies.json series.json
        if git diff --cached --quiet; then
          echo "لا توجد تحديثات جديدة للبيانات."
        else
          git commit -m "تحديث تلقائي: تم تجديد ملفات movies.json و series.json"
          git push
        fi
