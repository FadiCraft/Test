name: Auto Movie and Series Scraper

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install cheerio

    - name: Create baseline files
      run: |
        echo "[]" > movies.json
        echo "[]" > series.json

    - name: Run Scraper
      run: node scraper.js

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add movies.json series.json
        
        if git diff --cached --quiet; then
          echo "لم يتم العثور على بيانات جديدة لحفظها حالياً."
        else
          git commit -m "تحديث تلقائي فوري وسريع للبيانات"
          git push
        fi
